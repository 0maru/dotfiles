model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"

[agents]
max_threads = 6
max_depth = 1

[features]
codex_hooks = true
multi_agent = true

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.serena]
command = "uvx"
args = [
  "--from",
  "git+https://github.com/oraios/serena",
  "serena-mcp-server",
  "--context",
  "codex",
  "--enable-web-dashboard",
  "false",
  "--project-from-cwd",
]
